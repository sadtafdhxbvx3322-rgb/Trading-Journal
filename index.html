<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trading Journal</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f4f4f9; }
    form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, select, button { display: block; width: 100%; margin-bottom: 15px; padding: 12px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
    button { background-color: #28a745; color: white; border: none; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>
  <h2>Log a New Trade</h2>
  <form id="tradeForm">
    <label>Asset:</label>
    <select id="asset" required>
      <option value="XAGUSD">XAGUSD</option>
      <option value="XAUUSD">XAUUSD</option>
      <option value="BTCUSD">BTCUSD</option>
      <option value="EURUSD">EURUSD</option>
    </select>
    <label>Entry Price:</label>
    <input type="number" step="any" id="entry" required />
    <label>Take Profit (TP):</label>
    <input type="number" step="any" id="tp" required />
    <label>Stop Loss (SL):</label>
    <input type="number" step="any" id="sl" required />
    <label>Result:</label>
    <select id="result" required>
      <option value="Win">Win</option>
      <option value="Loss">Loss</option>
      <option value="Breakeven">Breakeven</option>
    </select>
    <button type="submit">Upload Trade</button>
  </form>
  <script>
    document.getElementById('tradeForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const btn = event.target.querySelector('button');
      btn.innerText = "Uploading...";

      const tradeData = {
        asset: document.getElementById('asset').value,
        entryPrice: parseFloat(document.getElementById('entry').value),
        tp: parseFloat(document.getElementById('tp').value),
        sl: parseFloat(document.getElementById('sl').value),
        result: document.getElementById('result').value
      };
      try {
        const response = await fetch('/.netlify/functions/addTrade', {
          method: 'POST',
          body: JSON.stringify(tradeData)
        });
        if (response.ok) {
          alert("Trade Saved! 🚀");
          event.target.reset();
        } else {
          alert("Error saving trade.");
        }
      } catch (error) {
        alert("Network Error!");
      }
      btn.innerText = "Upload Trade";
    });
  </script>
</body>
</html>
